name: Run NBA Prop Model

on:
  schedule:
    # Run model: 9:15 AM ET (13:15 UTC) — after NBA schedule is published
    - cron: "15 13 * * *"
    # Grade picks: 12:30 AM ET (04:30 UTC) — after all games finish
    - cron: "30 4 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  run-model:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine task (model vs grading)
        id: task
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge 10 ] && [ "$HOUR" -le 18 ]; then
            echo "run_model=true" >> "$GITHUB_OUTPUT"
            echo "run_grade=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_model=false" >> "$GITHUB_OUTPUT"
            echo "run_grade=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Grade yesterday's picks
        if: steps.task.outputs.run_grade == 'true'
        run: python grade.py || echo "No picks to grade"

      - name: Run model
        if: steps.task.outputs.run_model == 'true'
        run: python main.py --fast || echo "Model run failed (no games today or API issue)"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/latest.json
          git add web/public/data/results_history.json
          git add logs/
          git diff --cached --quiet || git commit -m "chore: update props data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
