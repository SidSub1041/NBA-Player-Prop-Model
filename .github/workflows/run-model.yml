name: Run NBA Prop Model

on:
  schedule:
    # Run model 4x/day: 9 AM, 12 PM, 3 PM, 6 PM ET
    - cron: "15 13 * * *"   # 9:15 AM ET
    - cron: "0 16 * * *"    # 12:00 PM ET
    - cron: "0 19 * * *"    # 3:00 PM ET
    - cron: "0 22 * * *"    # 6:00 PM ET
    # Grade picks: 12:30 AM ET (after all games finish)
    - cron: "30 4 * * *"
  workflow_dispatch: # Allow manual trigger

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  run-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine task (model vs grading)
        id: task
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge 10 ] && [ "$HOUR" -le 23 ]; then
            echo "run_model=true" >> "$GITHUB_OUTPUT"
            echo "run_grade=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_model=false" >> "$GITHUB_OUTPUT"
            echo "run_grade=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Grade yesterday's picks
        if: steps.task.outputs.run_grade == 'true'
        run: python grade.py || echo "No picks to grade"

      - name: Run model
        if: steps.task.outputs.run_model == 'true'
        run: python main.py --fast || echo "Model run failed (no games today or API issue)"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/latest.json
          git add web/public/data/results_history.json
          git add logs/
          git diff --cached --quiet || git commit -m "chore: update props data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

  # ── Deploy to GitHub Pages ──────────────────────────────────────
  deploy:
    needs: run-model
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo (with latest data)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (includes model data just pushed)
        run: git pull --rebase origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci || npm install

      - name: Build static site
        working-directory: web
        env:
          PAGES_BASE_PATH: /NBA-Player-Prop-Model
          NEXT_PUBLIC_BASE_PATH: /NBA-Player-Prop-Model
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
